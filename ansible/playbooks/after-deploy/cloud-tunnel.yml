---
# cloud-tunnel — SSH tunnel homelab→cloudlab for mail ports.
#
# WHY THIS EXISTS:
# Hetzner firewall incorrectly blocks the homelab IP (165.173.1.38) on mail ports
# (993/587/465/25) despite rules allowing them from Any IPv4. Other IPs work fine.
# The tunnel forwards local ports → cloudlab's mailserver container via SSH,
# bypassing the firewall bug.
#
# REMOVAL (after Hetzner fixes the bug):
# 1. Delete this file
# 2. Restore stacks/email-mcp/compose.yml: change IMAP_HOST/SMTP_HOST back to
#    ${SMTP_HOST}, ports 993/587, VERIFY_SSL=true, remove extra_hosts
# 3. On homelab: sudo systemctl disable --now cloud-tunnel
#    sudo rm /etc/systemd/system/cloud-tunnel.service
#    sudo semodule -r cloud-tunnel
#    sudo rm /etc/sysctl.d/99-inotify.conf
# 4. Remove the import from ansible/playbooks/after-deploy.yml
# 5. Run: deno task deploy home && deno task ansible after-deploy home
#
# Variables:
#   cloud_tunnel_ssh_host: 23.88.101.28
#   cloud_tunnel_ssh_port: 26845
#   cloud_tunnel_ssh_user: spy4x
#   cloud_tunnel_target_ip: 172.25.0.2

- name: cloud-tunnel — SSH tunnel for mail ports
  hosts: homelab_servers
  become: yes
  vars:
    cloud_tunnel_ssh_host: "23.88.101.28"
    cloud_tunnel_ssh_port: 26845
    cloud_tunnel_ssh_user: "spy4x"
    cloud_tunnel_target_ip: "172.25.0.2"

  tasks:
    - name: Deploy systemd unit
      ansible.builtin.template:
        src: ../../templates/cloud-tunnel.service.j2
        dest: /etc/systemd/system/cloud-tunnel.service
        mode: "0644"
      notify: restart cloud-tunnel

    - name: Deploy SELinux policy source
      ansible.builtin.template:
        src: ../../templates/cloud-tunnel.te.j2
        dest: /tmp/cloud-tunnel.te
        mode: "0644"

    - name: Build and load SELinux policy
      block:
        - name: Compile SELinux module
          ansible.builtin.command:
            cmd: checkmodule -M -m /tmp/cloud-tunnel.te -o /tmp/cloud-tunnel.mod
          register: checkmodule_result
          changed_when: false
          failed_when: false

        - name: Package SELinux module
          ansible.builtin.command:
            cmd: semodule_package -m /tmp/cloud-tunnel.mod -o /tmp/cloud-tunnel.pp
          when: checkmodule_result.rc == 0

        - name: Load SELinux module
          ansible.builtin.command:
            cmd: semodule -i /tmp/cloud-tunnel.pp
          when: checkmodule_result.rc == 0
          notify: restart cloud-tunnel

        - name: Clean up temp files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/cloud-tunnel.te
            - /tmp/cloud-tunnel.mod
            - /tmp/cloud-tunnel.pp

    - name: Enable and start cloud-tunnel
      ansible.builtin.systemd:
        name: cloud-tunnel
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: restart cloud-tunnel
      ansible.builtin.systemd:
        name: cloud-tunnel
        state: restarted
