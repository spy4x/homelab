###############################################################
#                   Authelia configuration                    #
###############################################################
server:
  address: tcp://0.0.0.0:9091

log:
  level: info

# Session — stored in Redis (survives restarts)
session:
  name: authelia_session
  secret: ${AUTHELIA_SESSION_SECRET}
  expiration: 1h
  inactivity: 5m
  remember_me: 1d
  cookies:
    - domain: antonshubin.com
      authelia_url: https://auth.antonshubin.com
      default_redirection_url: https://dash.antonshubin.com
  redis:
    host: authelia-redis
    port: 6379

# Authentication backend — file-based
authentication_backend:
  file:
    path: /config/users.yml

# Access Control Rules
access_control:
  default_policy: deny
  rules:
    - domain: "antonshubin.com"
      policy: bypass
    - domain: "auth.antonshubin.com"
      policy: bypass
    - domain: "neatsoft.dev"
      policy: bypass
    - domain: "www.neatsoft.dev"
      policy: bypass

    - domain: "torrents.antonshubin.com"
      policy: one_factor
    - domain: "invoices.antonshubin.com"
      policy: one_factor
    - domain: "monica.antonshubin.com"
      policy: one_factor
    - domain: "crm.antonshubin.com"
      policy: one_factor
    - domain: "sage.antonshubin.com"
      policy: one_factor

    - domain: "grafana.antonshubin.com"
      policy: two_factor
    - domain: "metrics.antonshubin.com"
      policy: two_factor
    - domain: "portainer.antonshubin.com"
      policy: two_factor

# Storage — SQLite
storage:
  encryption_key: ${AUTHELIA_SESSION_SECRET}
  local:
    path: /data/db.sqlite

# Two-factor authentication
totp:
  issuer: antonshubin.com
  period: 30
  skew: 1

webauthn:
  disable: false
  display_name: Authelia
  attestation_conveyance_preference: none
  selection_criteria:
    user_verification: preferred

# Regulation — brute-force protection
regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 5m

# Notifications — file-based (can add SMTP later)
notifier:
  filesystem:
    filename: /data/notifications.yml

# Theme
theme: dark

# Password reset — required config even if not actively used
identity_validation:
  reset_password:
    jwt_secret: ${AUTHELIA_SESSION_SECRET}
