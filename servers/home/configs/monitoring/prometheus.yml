global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "node"
    static_configs:
      - targets: ["hl-mon-node-exporter:9100"]
        labels:
          server: "home"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["hl-mon-cadvisor:8080"]
        labels:
          server: "home"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
