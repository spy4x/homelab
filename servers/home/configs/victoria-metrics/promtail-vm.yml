server:
  http_listen_port: 9081
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

# Push to VictoriaLogs instead of Loki.
# VictoriaLogs accepts Loki-compatible push on the same path.
clients:
  - url: http://hl-victoria-logs:9428/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_compose_service_name"]
        target_label: service
      - source_labels: ["__meta_docker_compose_project_name"]
        target_label: project
