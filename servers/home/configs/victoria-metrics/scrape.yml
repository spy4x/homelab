global:
  scrape_interval: 15s

# Scrape targets identical to stacks/monitoring/prometheus.yml
# so the comparison is apples-to-apples.
scrape_configs:
  - job_name: "node"
    static_configs:
      - targets: ["hl-node-exporter:9100"]
        labels:
          server: "home"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["hl-cadvisor:8080"]
        labels:
          server: "home"

  - job_name: "victoria-metrics"
    static_configs:
      - targets: ["hl-victoria-metrics:8428"]
        labels:
          server: "home"
