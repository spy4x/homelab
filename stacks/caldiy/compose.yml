networks:
  proxy:
    external: true

services:
  caldiy-db:
    container_name: hl-caldiy-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: caldiy
      POSTGRES_PASSWORD: ${CALDIY_DB_PASSWORD}
      POSTGRES_DB: caldiy
    volumes:
      - ${VOLUMES_PATH}/caldiy/db:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: pg_isready -U caldiy -d caldiy || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  caldiy-redis:
    container_name: hl-caldiy-redis
    image: redis:7-alpine
    volumes:
      - ${VOLUMES_PATH}/caldiy/redis:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
    security_opt:
      - no-new-privileges:true

  caldiy:
    container_name: hl-caldiy
    image: calcom/cal.com:${CALDIY_VERSION:-latest}
    environment:
      - DATABASE_URL=postgresql://caldiy:${CALDIY_DB_PASSWORD}@caldiy-db:5432/caldiy
      - DATABASE_DIRECT_URL=postgresql://caldiy:${CALDIY_DB_PASSWORD}@caldiy-db:5432/caldiy
      - NEXTAUTH_SECRET=${CALDIY_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://schedule.${DOMAIN}/api/auth
      - NEXT_PUBLIC_WEBAPP_URL=https://schedule.${DOMAIN}
      - CALCOM_TELEMETRY_DISABLED=1
      - NODE_ENV=production
      - TZ=${TIMEZONE}
      - ALLOWED_HOSTNAMES=["schedule.${DOMAIN}"]
      - CALENDSO_ENCRYPTION_KEY=${CALDIY_ENCRYPTION_KEY}
      - REDIS_URL=redis://caldiy-redis:6379
      # SMTP — uses shared mailserver on cloud (mail.${DOMAIN})
      # Resolves via Cloudflare DNS to cloud server (23.88.x.x).
      # STARTTLS cert is Let's Encrypt (CN=mail.${DOMAIN}), valid.
      - EMAIL_FROM=${SMTP_FROM}
      - EMAIL_FROM_NAME=Cal.diy
      - EMAIL_SERVER_HOST=${SMTP_HOST}
      - EMAIL_SERVER_PORT=${SMTP_PORT}
      - EMAIL_SERVER_USER=${SMTP_USERNAME}
      - EMAIL_SERVER_PASSWORD=${SMTP_PASSWORD}
      # Bypass TLS cert validation in case STARTTLS cert chain has issues.
      # Cert is valid LE, but Node.js sometimes rejects cross-signed chains.
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    depends_on:
      caldiy-db:
        condition: service_healthy
      caldiy-redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-caldiy.loadbalancer.server.port=3000"
      - "traefik.http.routers.hl-schedule.rule=Host(`schedule.${DOMAIN}`)"
      - "traefik.http.routers.hl-schedule.entrypoints=websecure"
      - "traefik.http.routers.hl-schedule.tls=true"
      - "traefik.http.routers.hl-schedule.tls.certresolver=myresolver"
      # - "traefik.http.routers.hl-schedule.middlewares=auth,robots-deny@file"
