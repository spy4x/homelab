networks:
  proxy:
    external: true

services:
  caldiy-db:
    container_name: caldiy-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: caldiy
      POSTGRES_PASSWORD: ${CALDIY_DB_PASSWORD}
      POSTGRES_DB: caldiy
    volumes:
      - ${VOLUMES_PATH}/caldiy/db:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: pg_isready -U caldiy -d caldiy || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  caldiy-redis:
    container_name: caldiy-redis
    image: redis:7-alpine
    volumes:
      - ${VOLUMES_PATH}/caldiy/redis:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
    security_opt:
      - no-new-privileges:true

  caldiy:
    container_name: caldiy
    image: calcom/cal.com:${CALDIY_VERSION:-latest}
    environment:
      - DATABASE_URL=postgresql://caldiy:${CALDIY_DB_PASSWORD}@caldiy-db:5432/caldiy
      - DATABASE_DIRECT_URL=postgresql://caldiy:${CALDIY_DB_PASSWORD}@caldiy-db:5432/caldiy
      - NEXTAUTH_SECRET=${CALDIY_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://schedule.${DOMAIN}/api/auth
      - NEXT_PUBLIC_WEBAPP_URL=https://schedule.${DOMAIN}
      - CALCOM_TELEMETRY_DISABLED=1
      - NODE_ENV=production
      - TZ=${TIMEZONE}
      - ALLOWED_HOSTNAMES=["schedule.${DOMAIN}"]
      - CALENDSO_ENCRYPTION_KEY=${CALDIY_ENCRYPTION_KEY}
      - REDIS_URL=redis://caldiy-redis:6379
      - EMAIL_FROM=noreply@${DOMAIN}
      - EMAIL_SERVER_HOST=mail.${DOMAIN}
      - EMAIL_SERVER_PORT=587
      - EMAIL_SERVER_USER=noreply@${DOMAIN}
      - EMAIL_SERVER_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      caldiy-db:
        condition: service_healthy
      caldiy-redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.caldiy.loadbalancer.server.port=3000"
      - "traefik.http.routers.caldiy.rule=Host(`schedule.${DOMAIN}`)"
      - "traefik.http.routers.caldiy.entrypoints=websecure"
      - "traefik.http.routers.caldiy.tls=true"
      - "traefik.http.routers.caldiy.tls.certresolver=myresolver"
