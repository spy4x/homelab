name: ${PROJECT}
networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  # PostgreSQL for Umami
  umami-db:
    container_name: hl-umami-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - ${VOLUMES_PATH}/umami/db:/var/lib/postgresql/data:z
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Umami - Privacy-first web analytics
  # https://umami.is
  umami:
    container_name: hl-umami
    image: ghcr.io/umami-software/umami:latest
    environment:
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-umami.loadbalancer.server.port=3000"
      - "traefik.http.routers.hl-umami.rule=Host(`stats.${DOMAIN}`)"
      - "traefik.http.routers.hl-umami.entrypoints=websecure"
      - "traefik.http.routers.hl-umami.tls=true"
      - "traefik.http.routers.hl-umami.tls.certresolver=myresolver"
