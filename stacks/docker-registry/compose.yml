networks:
  proxy:
    external: true

services:
  docker-registry:
    container_name: hl-docker-registry
    image: registry:2
    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    volumes:
      - ${VOLUMES_PATH}/docker-registry:/var/lib/registry:z
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.hl-docker-registry.rule=Host(`registry.${DOMAIN}`)"
      - "traefik.http.routers.hl-docker-registry.entrypoints=websecure"
      - "traefik.http.routers.hl-docker-registry.tls=true"
      - "traefik.http.routers.hl-docker-registry.tls.certresolver=myresolver"
      - "traefik.http.services.hl-docker-registry.loadbalancer.server.port=5000"
      - "traefik.http.routers.hl-docker-registry.middlewares=auth"
