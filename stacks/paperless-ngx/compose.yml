networks:
  proxy:
    external: true

services:
  paperless-redis:
    container_name: hl-paperless-redis
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
    security_opt:
      - no-new-privileges:true
    networks:
      - default

  paperless-db:
    container_name: hl-paperless-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DB_PASSWORD}
    volumes:
      - ${VOLUMES_PATH}/paperless-ngx/db:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: pg_isready -U paperless -d paperless || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  paperless:
    container_name: hl-paperless
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      paperless-db:
        condition: service_healthy
      paperless-redis:
        condition: service_started
    volumes:
      - ${VOLUMES_PATH}/paperless-ngx/data:/usr/src/paperless/data:z
      - ${VOLUMES_PATH}/paperless-ngx/media:/usr/src/paperless/media:z
      - ${VOLUMES_PATH}/paperless-ngx/consume:/usr/src/paperless/consume:z
      - ${VOLUMES_PATH}/paperless-ngx/export:/usr/src/paperless/export:z
    environment:
      - PAPERLESS_REDIS=redis://hl-paperless-redis:6379
      - PAPERLESS_DBHOST=hl-paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PASSWORD}
      - PAPERLESS_URL=https://docs.${DOMAIN}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_TIME_ZONE=${TIMEZONE:-UTC}
      - USERMAP_UID=${PUID:-1000}
      - USERMAP_GID=${PGID:-1000}
      - PAPERLESS_OCR_LANGUAGE=eng
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-paperless.loadbalancer.server.port=8000"
      - "traefik.http.routers.hl-paperless.rule=Host(`docs.${DOMAIN}`)"
      - "traefik.http.routers.hl-paperless.entrypoints=websecure"
      - "traefik.http.routers.hl-paperless.tls=true"
      - "traefik.http.routers.hl-paperless.tls.certresolver=myresolver"
      # - "traefik.http.routers.hl-paperless.middlewares=auth,robots-deny@file"

  paperless-worker:
    container_name: hl-paperless-worker
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    command: ["document-consumer"]
    restart: unless-stopped
    depends_on:
      paperless-db:
        condition: service_healthy
      paperless-redis:
        condition: service_started
    volumes:
      - ${VOLUMES_PATH}/paperless-ngx/data:/usr/src/paperless/data:z
      - ${VOLUMES_PATH}/paperless-ngx/media:/usr/src/paperless/media:z
      - ${VOLUMES_PATH}/paperless-ngx/consume:/usr/src/paperless/consume:z
      - ${VOLUMES_PATH}/paperless-ngx/export:/usr/src/paperless/export:z
    environment:
      - PAPERLESS_REDIS=redis://hl-paperless-redis:6379
      - PAPERLESS_DBHOST=hl-paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PASSWORD}
      - PAPERLESS_URL=https://docs.${DOMAIN}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_TIME_ZONE=${TIMEZONE:-UTC}
      - USERMAP_UID=${PUID:-1000}
      - USERMAP_GID=${PGID:-1000}
      - PAPERLESS_OCR_LANGUAGE=eng
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    security_opt:
      - no-new-privileges:true
    networks:
      - default
