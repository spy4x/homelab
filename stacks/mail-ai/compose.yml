services:
  mail-ai:
    image: denoland/deno:latest
    container_name: mail-ai
    restart: unless-stopped
    command:
      - run
      - --allow-net
      - --allow-env
      - --allow-read
      - --allow-write=/app/data
      - --allow-sys=hostname
      - /app/+main.ts
    volumes:
      - ${PATH_APPS}/stacks/mail-ai/+main.ts:/app/+main.ts:ro,z
      - ${VOLUMES_PATH}/mail-ai/data:/app/data:z
    environment:
      - MAIL_AI_IMAP_HOST=${MAIL_AI_IMAP_HOST}
      - MAIL_AI_IMAP_PORT=${MAIL_AI_IMAP_PORT}
      - MAIL_AI_IMAP_USER=${MAIL_AI_IMAP_USER}
      - MAIL_AI_IMAP_PASSWORD=${MAIL_AI_IMAP_PASSWORD}
      - MAIL_AI_DEEPSEEK_API_KEY=${MAIL_AI_DEEPSEEK_API_KEY}
      - MAIL_AI_NTFY_URL=${MAIL_AI_NTFY_URL_MAIL}
      - MAIL_AI_NTFY_TOKEN=${MAIL_AI_NTFY_TOKEN}
      - MAIL_AI_DATA_PATH=/app/data
      - MAIL_AI_POLL_INTERVAL_MS=${MAIL_AI_POLL_INTERVAL_MS}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
