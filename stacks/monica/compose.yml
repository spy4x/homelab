name: ${PROJECT}

networks:
  proxy:
    external: true

services:
  # MariaDB database for Monica CRM
  monica-db:
    container_name: hl-monica-db
    image: mariadb:11
    restart: unless-stopped
    volumes:
      - ${VOLUMES_PATH}/monica/db:/var/lib/mysql:z
    environment:
      - MYSQL_ROOT_PASSWORD=${MONICA_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=monica
      - MYSQL_USER=monica
      - MYSQL_PASSWORD=${MONICA_DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - default
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Monica CRM - Personal relationship manager
  # https://github.com/monicahq/monica
  monica:
    container_name: hl-monica
    image: monica:latest
    restart: unless-stopped
    depends_on:
      monica-db:
        condition: service_healthy
    volumes:
      - ${VOLUMES_PATH}/monica/data:/var/www/html/storage:z
    environment:
      - APP_ENV=production
      - APP_URL=https://crm.${DOMAIN}
      - DB_CONNECTION=mysql
      - DB_HOST=monica-db
      - DB_PORT=3306
      - DB_DATABASE=monica
      - DB_USERNAME=monica
      - DB_PASSWORD=${MONICA_DB_PASSWORD}
      - TRUSTED_PROXIES=${MONICA_TRUSTED_PROXIES:-0.0.0.0/0}
      - APP_DEFAULT_LOCALE=en
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_DRIVER=sync
      - MAIL_DRIVER=smtp
      - MAIL_HOST=${SMTP_HOST}
      - MAIL_PORT=${SMTP_PORT}
      - MAIL_USERNAME=${SMTP_USERNAME}
      - MAIL_PASSWORD=${SMTP_PASSWORD}
      - MAIL_ENCRYPTION=tls
      - MAIL_FROM_ADDRESS=noreply@${DOMAIN}
      - MAIL_FROM_NAME="Monica CRM"
      - CHECK_VERSION=false
      # APP_FORCE_URL intentionally unset — TRUSTED_PROXIES handles scheme
      # via X-Forwarded-Proto. Without this, internal Docker requests to
      # hl-monica:80 get redirected to the public URL, breaking MCP auth.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-monica.loadbalancer.server.port=80"
      # General router — web UI with Authelia
      - "traefik.http.routers.hl-monica.rule=Host(`crm.${DOMAIN}`)"
      - "traefik.http.routers.hl-monica.entrypoints=websecure"
      - "traefik.http.routers.hl-monica.tls=true"
      - "traefik.http.routers.hl-monica.middlewares=authelia@file,robots-deny@file"
      - "traefik.http.routers.hl-monica.tls.certresolver=myresolver"
      # API router — bypass Authelia (Bearer token auth instead)
      - "traefik.http.routers.hl-monica-api.rule=Host(`crm.${DOMAIN}`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.hl-monica-api.entrypoints=websecure"
      - "traefik.http.routers.hl-monica-api.tls=true"
      - "traefik.http.routers.hl-monica-api.tls.certresolver=myresolver"
      - "traefik.http.routers.hl-monica-api.priority=100"
      - "traefik.http.routers.hl-monica-api.service=hl-monica"
      # No middlewares for the API router — Authelia bypassed, token auth handled by Monica
