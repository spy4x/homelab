name: ${PROJECT}

networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  mirotalk:
    container_name: hl-mirotalk
    image: mirotalk/p2p:latest
    environment:
      - TZ=${TIMEZONE:-UTC}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-mirotalk.loadbalancer.server.port=3000"
      - "traefik.http.routers.hl-mirotalk.rule=Host(`talk.${DOMAIN}`)"
      - "traefik.http.routers.hl-mirotalk.entrypoints=websecure"
      - "traefik.http.routers.hl-mirotalk.tls=true"
      - "traefik.http.routers.hl-mirotalk.tls.certresolver=myresolver"
