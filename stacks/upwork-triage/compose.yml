name: ${PROJECT}

networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  upwork-triage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upwork-triage
    environment:
      - UPWORK_TRIAGE_DEEPSEEK_API_KEY=${UPWORK_TRIAGE_DEEPSEEK_API_KEY}
      - UPWORK_TRIAGE_TELEGRAM_BOT_TOKEN=${UPWORK_TRIAGE_TELEGRAM_BOT_TOKEN}
      - UPWORK_TRIAGE_TELEGRAM_CHAT_ID=${UPWORK_TRIAGE_TELEGRAM_CHAT_ID}
      - UPWORK_TRIAGE_WEBHOOK_AUTH_TOKEN=${UPWORK_TRIAGE_WEBHOOK_AUTH_TOKEN}
      - UPWORK_TRIAGE_DATA_PATH=/app/data
      - PORT=8000
    volumes:
      - ${VOLUMES_PATH}/upwork-triage/data:/app/data:z
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      # ── Shared labels ──
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.upwork-triage.loadbalancer.server.port=8000"

      # ── Router for webhook API (no basic auth, app handles auth) ──
      - "traefik.http.routers.upwork-triage.rule=Host(`upwork-triage.${DOMAIN}`) && (PathPrefix(`/v1`) || PathPrefix(`/health`))"
      - "traefik.http.routers.upwork-triage.entrypoints=websecure"
      - "traefik.http.routers.upwork-triage.tls=true"
      - "traefik.http.routers.upwork-triage.tls.certresolver=myresolver"

      # ── Router for WebUI dashboard (with basic auth) ──
      - "traefik.http.routers.upwork-triage-webui.rule=Host(`upwork-triage.${DOMAIN}`)"
      - "traefik.http.routers.upwork-triage-webui.entrypoints=websecure"
      - "traefik.http.routers.upwork-triage-webui.tls=true"
      - "traefik.http.routers.upwork-triage-webui.tls.certresolver=myresolver"
      - "traefik.http.routers.upwork-triage-webui.middlewares=upwork-triage-auth"
      - "traefik.http.middlewares.upwork-triage-auth.basicauth.users=${BASIC_AUTH_USER}:${BASIC_AUTH_PASSWORD}"
