networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  # AdGuard Home is a network-wide ad and tracker blocker that also functions as a DNS server.
  # It provides DNS-level ad blocking, tracker blocking, and parental control features.
  # Access the web interface to configure DNS settings, filters, and view statistics.
  adguard:
    container_name: hl-adguard
    image: adguard/adguardhome:latest
    volumes:
      - ${VOLUMES_PATH}/adguard/work:/opt/adguardhome/work:z
      - ${VOLUMES_PATH}/adguard/conf:/opt/adguardhome/conf:z
    ports:
      - 53:53/tcp # DNS
      - 53:53/udp # DNS
      - 853:853/tcp # DNS-over-TLS
    # - 3000:3000/tcp  # Initial setup web interface (can be disabled after setup)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-adguard.loadbalancer.server.port=80"
      - "traefik.http.routers.hl-adguard.rule=Host(`dns.${DOMAIN}`)"
      - "traefik.http.routers.hl-adguard.entrypoints=websecure"
      - "traefik.http.routers.hl-adguard.tls=true"
      - "traefik.http.routers.hl-adguard.tls.certresolver=myresolver"
