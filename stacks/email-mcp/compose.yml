networks:
  proxy:
    external: true

services:
  # Email MCP — IMAP + SMTP for AI assistants (OpenWebUI).
  # Source: https://github.com/ai-zerolab/mcp-email-server (BSD-3-Clause)
  # Speaks Streamable HTTP on port 9557. Open WebUI connects via TOOL_SERVER_CONNECTIONS.
  email-mcp:
    container_name: hl-email-mcp
    image: ghcr.io/ai-zerolab/mcp-email-server:latest
    command: ["streamable-http"]
    restart: unless-stopped
    environment:
      # --- HTTP transport ---
      - MCP_HOST=0.0.0.0
      - MCP_PORT=9557
      # Allow connections from OpenWebUI container on the proxy network.
      # DNS rebinding protection enabled (default). Bare host entries allow any port.
      - MCP_ALLOWED_HOSTS=hl-email-mcp:*,hl-open-webui:*,localhost:*,127.0.0.1:*
      - MCP_ALLOWED_ORIGINS=http://hl-email-mcp:*,http://hl-open-webui:*,http://localhost:*,http://127.0.0.1:*
      - MCP_ENABLE_DNS_REBINDING_PROTECTION=true

      # --- Account: primary (anton@antonshubin.com) ---
      - MCP_EMAIL_SERVER_ACCOUNT_NAME=primary
      - MCP_EMAIL_SERVER_FULL_NAME=Anton Shubin
      - MCP_EMAIL_SERVER_EMAIL_ADDRESS=${EMAIL_MCP_PRIMARY_USER}
      - MCP_EMAIL_SERVER_PASSWORD=${EMAIL_MCP_PRIMARY_PASSWORD}

      # --- IMAP via SSH tunnel (cloud-tunnel) ---
      - MCP_EMAIL_SERVER_IMAP_HOST=host.docker.internal
      - MCP_EMAIL_SERVER_IMAP_PORT=1993
      - MCP_EMAIL_SERVER_IMAP_SSL=true
      - MCP_EMAIL_SERVER_IMAP_START_SSL=false
      - MCP_EMAIL_SERVER_IMAP_VERIFY_SSL=false

      # --- SMTP via SSH tunnel (cloud-tunnel) ---
      - MCP_EMAIL_SERVER_SMTP_HOST=host.docker.internal
      - MCP_EMAIL_SERVER_SMTP_PORT=1587
      - MCP_EMAIL_SERVER_SMTP_SSL=false
      - MCP_EMAIL_SERVER_SMTP_START_SSL=true
      - MCP_EMAIL_SERVER_SMTP_VERIFY_SSL=false

      # --- Behaviour ---
      # Docker Mailserver uses "Sent" (not INBOX.Sent). Auto-detect usually works,
      # but setting explicitly avoids surprises.
      - MCP_EMAIL_SERVER_SENT_FOLDER_NAME=Sent
      - MCP_EMAIL_SERVER_SAVE_TO_SENT=true
      # Attachments disabled by default — enable explicitly if needed (see README).
      - MCP_EMAIL_SERVER_ENABLE_ATTACHMENT_DOWNLOAD=false
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
    labels:
      # Internal MCP — no Traefik exposure. OpenWebUI reaches it via Docker DNS.
      - "traefik.enable=false"
    healthcheck:
      # MCP Streamable HTTP — send initialize, expect 200 with "result" key.
      test: [
        "CMD",
        "python",
        "-c",
        "import urllib.request, json; b=json.dumps({'jsonrpc':'2.0','id':1,'method':'initialize','params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(); r=urllib.request.Request('http://localhost:9557/mcp', data=b, headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'}); resp=urllib.request.urlopen(r, timeout=5); assert resp.status==200; assert b'result' in resp.read()",
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
