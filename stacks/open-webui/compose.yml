networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  open-webui:
    container_name: hl-open-webui
    image: ghcr.io/open-webui/open-webui:latest
    restart: unless-stopped
    environment:
      # --- Existing: Web loader via Playwright ---
      - WEB_LOADER_ENGINE=playwright
      - PLAYWRIGHT_WS_URL=ws://playwright:3000
      - PLAYWRIGHT_TIMEOUT=5000
      - ENABLE_RAG_LOCAL_WEB_FETCH=true

      # --- Web Search via SearXNG ---
      - ENABLE_WEB_SEARCH=${ENABLE_WEB_SEARCH:-true}
      - WEB_SEARCH_ENGINE=${WEB_SEARCH_ENGINE:-searxng}
      - SEARXNG_QUERY_URL=${SEARXNG_QUERY_URL:-http://searxng:8080/search?format=json}
      - WEB_SEARCH_RESULT_COUNT=${WEB_SEARCH_RESULT_COUNT:-3}
      - BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL=${BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL:-true}

      # --- Native Mode (Agentic Mode) for all models ---
      # Unlocks built-in system tools: time, calendar, memory, fetch, web search, etc.
      - "DEFAULT_MODEL_PARAMS={\"function_calling\":\"native\"}"

      # --- Feature Toggles ---
      # Calendar: AI can create/search events, requires WEBUI_URL
      - WEBUI_URL=https://ai.${DOMAIN}
      - ENABLE_CALENDAR=true
      - ENABLE_MEMORIES=true
      - ENABLE_NOTES=true

      # --- Image Generation (OpenAI gpt-image-2) ---
      - ENABLE_IMAGE_GENERATION=true
      - IMAGE_GENERATION_ENGINE=openai
      - IMAGE_GENERATION_MODEL=gpt-image-2
      - IMAGE_SIZE=1024x1024
      - "IMAGES_OPENAI_API_PARAMS={\"quality\":\"low\"}"

      # --- MCP + OpenAPI Tool Servers ---
      # playwright-mcp provides browser automation (screenshots, web scraping)
      # mcpo proxies stdio MCP servers → OpenAPI. Each tool gets its own route + OpenAPI spec
      - TOOL_SERVER_CONNECTIONS=[{"url":"http://hl-playwright-mcp:8099","path":"/mcp","type":"mcp","auth_type":"none","key":"","config":{"enable":true,"access_grants":[{"principal_type":"user","principal_id":"*","permission":"read"}]},"headers":{"Accept":"application/json, text/event-stream","Content-Type":"application/json"}},{"url":"http://mcpo:8000/youtube-transcript","path":"openapi.json","type":"openapi","spec_type":"url","auth_type":"bearer","key":"mcpo-local","config":{"enable":true,"access_grants":[{"principal_type":"user","principal_id":"*","permission":"read"}]},"info":{"name":"YouTube Transcript","description":"Fetch YouTube video transcripts"}},{"url":"http://mcpo:8000/fetch","path":"openapi.json","type":"openapi","spec_type":"url","auth_type":"bearer","key":"mcpo-local","config":{"enable":true,"access_grants":[{"principal_type":"user","principal_id":"*","permission":"read"}]},"info":{"name":"Web Fetch","description":"Fetch any URL as HTML, Markdown, or plain text"}},{"url":"http://hl-caldav-mcp:3000/mcp","type":"mcp","auth_type":"bearer","key":"mcpo-local","config":{"enable":true,"access_grants":[{"principal_type":"user","principal_id":"*","permission":"read"}]},"headers":{"Accept":"application/json, text/event-stream","Content-Type":"application/json"},"info":{"id":"caldav-mcp","name":"CalDAV MCP","description":"CalDAV MCP server — todos, events, calendars"}},{"url":"http://hl-immich-mcp:5000/mcp","type":"mcp","auth_type":"none","config":{"enable":true,"access_grants":[{"principal_type":"user","principal_id":"*","permission":"read"}]},"headers":{"Accept":"application/json, text/event-stream","Content-Type":"application/json"},"info":{"id":"immich-mcp","name":"Immich MCP","description":"Immich photo management — search albums, manage tags and people"}},{"url":"http://hl-email-mcp:9557/mcp","type":"mcp","auth_type":"none","config":{"enable":true,"access_grants":[{"principal_type":"user","principal_id":"*","permission":"read"}]},"headers":{"Accept":"application/json, text/event-stream","Content-Type":"application/json"},"info":{"id":"email-mcp","name":"Email MCP","description":"IMAP + SMTP via self-hosted mailserver (mail.antonshubin.com)"}},{"url":"http://hl-google-maps-mcp:3000/mcp","type":"mcp","auth_type":"none","config":{"enable":true,"access_grants":[{"principal_type":"user","principal_id":"*","permission":"read"}]},"headers":{"Accept":"application/json, text/event-stream","Content-Type":"application/json"},"info":{"id":"google-maps-mcp","name":"Google Maps","description":"Places search, geocoding, directions, weather via Google Maps Platform"}}]
      - USER_PERMISSIONS_FEATURES_DIRECT_TOOL_SERVERS=true

      # --- HuggingFace ---
      - HF_TOKEN=${HF_TOKEN}

      # --- LLM Providers (OpenAI-compatible) ---
      - OPENAI_API_KEYS=${OPENAI_API_KEYS}
      - OPENAI_API_BASE_URLS=${OPENAI_API_BASE_URLS}
      # Whitelist models per provider to keep the selector clean
      # Index 0 = DeepSeek, Index 1 = OpenAI, Index 2 = MiniMax
      - "OPENAI_API_CONFIGS={\"0\":{\"model_ids\":[\"deepseek-v4-flash\",\"deepseek-v4-pro\"]},\"1\":{\"model_ids\":[\"gpt-5.4-mini\"]},\"2\":{\"model_ids\":[\"MiniMax-M3\"]}}"

      # --- Ollama Local LLM ---
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-true}
      - OLLAMA_API_BASE_URL=${OLLAMA_API_BASE_URL:-http://ollama:11434}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}

      # --- Default Model Settings ---
      - DEFAULT_MODELS=deepseek-v4-flash,deepseek-v4-pro,MiniMax-M3,gemma4:e4b,gpt-5.4-mini
      - "DEFAULT_MODEL_METADATA={\"capabilities\":{\"vision\":true,\"file_upload\":true,\"file_context\":true,\"web_search\":true,\"image_generation\":true,\"code_interpreter\":true},\"defaultFeatureIds\":[\"image_generation\"]}"
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-user}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
      - ENABLE_LOGIN_FORM=${ENABLE_LOGIN_FORM:-true}

      # --- RAG Document Extraction ---
      - CONTENT_EXTRACTION_ENGINE=${CONTENT_EXTRACTION_ENGINE:-tika}
      - TIKA_SERVER_URL=${TIKA_SERVER_URL:-http://tika:9998}
      - RAG_TOP_K=${RAG_TOP_K:-10}
      - RAG_FILE_MAX_COUNT=${RAG_FILE_MAX_COUNT:-10}
      - RAG_FILE_MAX_SIZE=${RAG_FILE_MAX_SIZE:-52428800}

      # --- User Permissions ---
      - USER_PERMISSIONS_FEATURES_WEB_SEARCH=true
      - USER_PERMISSIONS_FEATURES_CALENDAR=true
      - USER_PERMISSIONS_FEATURES_MEMORIES=true
      - USER_PERMISSIONS_FEATURES_NOTES=true
      - USER_PERMISSIONS_FEATURES_IMAGE_GENERATION=true
      - USER_PERMISSIONS_WORKSPACE_TOOLS_ACCESS=true
      - USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS=true

      # --- Config persistence ---
      # Set to false to force env vars to override DB config
      - ENABLE_PERSISTENT_CONFIG=${ENABLE_PERSISTENT_CONFIG:-false}

      # --- Auth (if not using OAuth) ---
      - WEBUI_NAME=${WEBUI_NAME:-Homelab AI}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - ${VOLUMES_PATH}/open-webui:/app/backend/data:z
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-open-webui.loadbalancer.server.port=8080"
      - "traefik.http.routers.hl-open-webui.rule=Host(`ai.${DOMAIN}`)"
      - "traefik.http.routers.hl-open-webui.entrypoints=websecure"
      - "traefik.http.routers.hl-open-webui.tls=true"
      - "traefik.http.routers.hl-open-webui.tls.certresolver=myresolver"

  # --- MCP Proxy (bridges stdio MCP servers to OpenAPI HTTP for Open WebUI) ---
  # mcpo Docker image includes Node.js (npx) and Python (uvx) for running MCP servers
  # Config file defines which MCP servers to spawn (YouTube Transcript, Fetch, etc.)
  mcpo:
    container_name: hl-mcpo
    image: ghcr.io/open-webui/mcpo:main
    restart: unless-stopped
    command: ["--config", "/config/mcp-servers.json", "--api-key", "mcpo-local"]
    volumes:
      - ./mcpo-config.json:/config/mcp-servers.json:ro
    networks:
      - proxy
