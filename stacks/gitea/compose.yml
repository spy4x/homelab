networks:
  proxy:
    external: true

services:
  gitea-db:
    container_name: gitea-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD}
    volumes:
      - ${VOLUMES_PATH}/gitea/db:/var/lib/postgresql/data:z
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U gitea -d gitea
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  gitea:
    container_name: gitea
    image: gitea/gitea:latest
    environment:
      - USER_UID=${PUID:-1000}
      - USER_GID=${PGID:-1000}
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD}
      - GITEA__server__ROOT_URL=https://git.${DOMAIN}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__DOMAIN=git.${DOMAIN}
      - GITEA__admin__DEFAULT_EMAIL_NOTIFICATIONS=enabled
      - GITEA__security__MIN_PASSWORD_LENGTH=12
      - GITEA__security__DISABLE_GIT_HOOKS=false
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__service__ENABLE_CAPTCHA=true
      - GITEA__service__REGISTER_EMAIL_CONFIRM=true
      - GITEA__captcha__ENABLED=true
      - GITEA__captcha__TYPE=image
      - GITEA__session__PROVIDER=file
      - GITEA__mailer__ENABLED=true
      - GITEA__mailer__PROTOCOL=smtp
      - GITEA__mailer__SMTP_ADDR=${SMTP_HOST}
      - GITEA__mailer__SMTP_PORT=${SMTP_PORT}
      - GITEA__mailer__USER=${SMTP_USERNAME}
      - GITEA__mailer__PASSWD=${SMTP_PASSWORD}
      - GITEA__mailer__FROM=${SMTP_FROM}
    volumes:
      - ${VOLUMES_PATH}/gitea/data:/data:z
      - /etc/localtime:/etc/localtime:ro,z
    networks:
      - proxy
      - default
    depends_on:
      - gitea-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.gitea.rule=Host(`git.${DOMAIN}`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls=true"
      - "traefik.http.routers.gitea.tls.certresolver=myresolver"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"
