networks:
  proxy:
    external: true

services:
  monica-mcp:
    container_name: hl-monica-mcp
    build:
      context: .
      dockerfile: Dockerfile
    image: hl-monica-mcp:latest
    restart: unless-stopped
    environment:
      - MCP_PORT=3000
      - MONICA_BASE_URL=http://hl-monica:80
      - MONICA_API_TOKEN=${MONICA_API_TOKEN}
      - MONICA_TOKEN_TYPE=bearer
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      # Internal MCP — no Traefik exposure. OpenWebUI reaches it via Docker DNS.
      - "traefik.enable=false"
    healthcheck:
      test: [
        "CMD",
        "node",
        "-e",
        "fetch('http://localhost:3000/mcp',{method:'GET'}).then(r=>process.exit(r.status===405?0:1)).catch(()=>process.exit(1))",
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
