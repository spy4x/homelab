networks:
  proxy:
    external: true

name: piped

services:
  frontend:
    container_name: hl-piped-frontend
    image: 1337kavin/piped-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - BACKEND_HOSTNAME=pipedapi.${DOMAIN}
    networks:
      - proxy
      - default
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.hl-piped.rule=Host(`piped.${DOMAIN}`)"
      - "traefik.http.routers.hl-piped.middlewares=robots-deny@file"
      - "traefik.http.routers.hl-piped.entrypoints=websecure"
      - "traefik.http.routers.hl-piped.tls=true"
      - "traefik.http.routers.hl-piped.tls.certresolver=myresolver"
      - "traefik.http.services.hl-piped.loadbalancer.server.port=80"

  backend:
    container_name: hl-piped-backend
    image: 1337kavin/piped:latest
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./config.properties:/app/config.properties:ro,z
    depends_on:
      db:
        condition: service_healthy
      bg-helper:
        condition: service_started
    networks:
      - proxy
      - default
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.hl-piped-api.rule=Host(`pipedapi.${DOMAIN}`)"
      - "traefik.http.routers.hl-piped-api.entrypoints=websecure"
      - "traefik.http.routers.hl-piped-api.tls=true"
      - "traefik.http.routers.hl-piped-api.tls.certresolver=myresolver"
      - "traefik.http.services.hl-piped-api.loadbalancer.server.port=8080"

  proxy:
    container_name: hl-piped-proxy
    image: 1337kavin/piped-proxy:latest
    restart: unless-stopped
    networks:
      - proxy
      - default
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.hl-piped-proxy.rule=Host(`pipedproxy.${DOMAIN}`)"
      - "traefik.http.routers.hl-piped-proxy.entrypoints=websecure"
      - "traefik.http.routers.hl-piped-proxy.tls=true"
      - "traefik.http.routers.hl-piped-proxy.tls.certresolver=myresolver"
      - "traefik.http.services.hl-piped-proxy.loadbalancer.server.port=8080"

  bg-helper:
    container_name: hl-piped-bg-helper
    image: 1337kavin/bg-helper-server:latest
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  db:
    container_name: hl-piped-db
    image: pgautoupgrade/pgautoupgrade:16-alpine
    restart: unless-stopped
    volumes:
      - ${VOLUMES_PATH}/piped/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${PIPED_DB_NAME}
      - POSTGRES_USER=${PIPED_DB_USER}
      - POSTGRES_PASSWORD=${PIPED_DB_PASSWORD}
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PIPED_DB_USER} -d ${PIPED_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    security_opt:
      - no-new-privileges:true
