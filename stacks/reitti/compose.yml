name: ${PROJECT}

networks:
  proxy:
    external: true
  reitti-net:
    driver: bridge

volumes:
  reitti-data:
  postgis-data:
  redis-data:
  tile-cache-data:

services:
  reitti:
    container_name: hl-reitti
    image: dedicatedcode/reitti:latest
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
      tile-cache:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${REITTI_MEM_LIMIT:-1024M}
          cpus: ${REITTI_CPU_LIMIT:-0.5}
    security_opt:
      - no-new-privileges:true
    networks:
      - reitti-net
      - proxy
    volumes:
      - reitti-data:/data
    environment:
      POSTGIS_USER: ${REITTI_DB_USER:-reitti}
      POSTGIS_PASSWORD: ${REITTI_DB_PASSWORD:-reitti}
      POSTGIS_DB: ${REITTI_DB_NAME:-reittidb}
      POSTGIS_HOST: postgis
      POSTGIS_PORT: 5432
      REDIS_HOST: redis
      SERVER_PORT: 8080
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-reitti.loadbalancer.server.port=8080"
      - "traefik.http.routers.hl-reitti.rule=Host(`loc.${DOMAIN}`)"
      - "traefik.http.routers.hl-reitti.entrypoints=websecure"
      - "traefik.http.routers.hl-reitti.tls=true"
      - "traefik.http.routers.hl-reitti.tls.certresolver=myresolver"
    healthcheck:
      test: [
        "CMD-SHELL",
        "sh -c 'curl -f --max-time 5 \"http://localhost:8080/actuator/health\" || exit 1'",
      ]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  postgis:
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    networks:
      - reitti-net
    volumes:
      - postgis-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${REITTI_DB_USER:-reitti}
      POSTGRES_PASSWORD: ${REITTI_DB_PASSWORD:-reitti}
      POSTGRES_DB: ${REITTI_DB_NAME:-reittidb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REITTI_DB_USER:-reitti} -d ${REITTI_DB_NAME:-reittidb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - reitti-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tile-cache:
    image: dedicatedcode/reitti-tile-cache:latest
    restart: unless-stopped
    networks:
      - reitti-net
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://127.0.0.1/osm/0/0/0.png"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - tile-cache-data:/var/cache/nginx
