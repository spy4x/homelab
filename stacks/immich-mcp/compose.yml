networks:
  proxy:
    external: true

services:
  immich-mcp:
    container_name: hl-immich-mcp
    build:
      context: .
      dockerfile: Dockerfile
    image: hl-immich-mcp:latest
    restart: unless-stopped
    environment:
      - IMMICH_BASE_URL=https://photos.${DOMAIN}
      - IMMICH_API_KEY=${IMMICH_MCP_API_KEY}
      - MCP_LOG_LEVEL=Warning
      - DOWNLOAD_MODE=url
      - MAX_PAGE_SIZE=100
      # Avoid inotify limit in Docker — use polling for file changes
      - DOTNET_USE_POLLING_FILE_WATCHER=true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
