name: ${PROJECT}

networks:
  proxy:
    external: true

services:
  authelia:
    container_name: hl-authelia
    image: authelia/authelia:latest
    volumes:
      - ${PATH_APPS}/configs/authelia/configuration.yml:/config/configuration.yml:ro
      - ${PATH_APPS}/configs/authelia/users.yml:/config/users.yml:ro
      - ${VOLUMES_PATH}/authelia/data:/data:z
    environment:
      - TZ=${TIMEZONE}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
    restart: unless-stopped
    healthcheck:
      test: [
        "CMD",
        "wget",
        "--no-verbose",
        "--tries=1",
        "--spider",
        "http://localhost:9091/api/health",
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-authelia.loadbalancer.server.port=9091"
      - "traefik.http.routers.hl-authelia.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.hl-authelia.entrypoints=websecure"
      - "traefik.http.routers.hl-authelia.tls=true"
      - "traefik.http.routers.hl-authelia.tls.certresolver=myresolver"
      - "traefik.http.routers.hl-authelia.middlewares=robots-deny@file"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"

  authelia-redis:
    container_name: hl-authelia-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
