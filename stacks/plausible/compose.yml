name: ${PROJECT}
networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  # PostgreSQL database for Plausible metadata
  plausible-db:
    container_name: hl-plausible-db
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=plausible
      - POSTGRES_USER=plausible
      - POSTGRES_PASSWORD=${PLAUSIBLE_DB_PASSWORD}
    volumes:
      - ${VOLUMES_PATH}/plausible/db:/var/lib/postgresql/data:z
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"

  # ClickHouse columnar analytics DB for Plausible event storage
  # Heavy: ~512MB RAM minimum. Was hitting MEMORY_LIMIT_EXCEEDED at 768M
  # Bumped to 1.5G to handle query concurrency.
  # Config override enables neighbor() deprecated in 26.x.
  plausible-events:
    container_name: hl-plausible-events
    image: clickhouse/clickhouse-server:latest
    environment:
      - CLICKHOUSE_DB=plausible
      - CLICKHOUSE_PASSWORD=plausible
      - CLICKHOUSE_MAX_SERVER_MEMORY_USAGE=1200000000
    volumes:
      - ${VOLUMES_PATH}/plausible/clickhouse:/var/lib/clickhouse:z
      - ./clickhouse-config-override.xml:/etc/clickhouse-server/users.d/override.xml:ro
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "0.5"

  # Plausible Analytics - lightweight, privacy-friendly analytics
  # Requires PostgreSQL (~256MB) + ClickHouse (~512MB) => ~1GB total RAM
  # Erlang VM needs 512M+ to handle FD pressure; default Docker ulimit 1024 too low
  # https://github.com/plausible/analytics
  plausible:
    container_name: hl-plausible
    image: plausible/analytics:latest
    environment:
      - BASE_URL=https://analytics.${DOMAIN}
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY}
      - SIGNING_SALT=${PLAUSIBLE_SIGNING_SALT}
      - DATABASE_URL=postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible-db:5432/plausible
      - CLICKHOUSE_DATABASE_URL=http://default:plausible@plausible-events:8123/plausible
      - DISABLE_REGISTRATION=true
      - ADMIN_USER_EMAIL=${PLAUSIBLE_ADMIN_EMAIL:-admin@${DOMAIN}}
      - ADMIN_USER_NAME=admin
      - ADMIN_USER_PWD=${PLAUSIBLE_ADMIN_PASSWORD}
      - ERL_AFLAGS="-kernel inet_dist_listen_min 9100 -kernel inet_dist_listen_max 9110"
    depends_on:
      plausible-db:
        condition: service_healthy
      plausible-events:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint-wrapper.sh"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-plausible.loadbalancer.server.port=8000"
      - "traefik.http.routers.hl-plausible.rule=Host(`analytics.${DOMAIN}`)"
      - "traefik.http.routers.hl-plausible.entrypoints=websecure"
      - "traefik.http.routers.hl-plausible.tls=true"
      - "traefik.http.routers.hl-plausible.tls.certresolver=myresolver"
