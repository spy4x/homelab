networks:
  proxy:
    external: true

services:
  # Google Maps MCP — search places, geocode, directions, weather, etc.
  # Source: https://github.com/cablate/mcp-google-map (MIT, 356 ⭐)
  # Image built locally from `mcp-google-map` source. No prebuilt image exists yet
  # at GHCR (as of June 2026), so we ship a Dockerfile that pins a release tag.
  google-maps-mcp:
    container_name: hl-google-maps-mcp
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pin a release tag for reproducibility. Bump deliberately.
        MCP_GOOGLE_MAP_VERSION: ${MCP_GOOGLE_MAP_VERSION:-v0.0.52}
    restart: unless-stopped
    environment:
      # --- API key ---
      # Get one at https://console.cloud.google.com → enable Places API (New) + Routes API
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}

      # --- HTTP transport (Streamable HTTP) ---
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=3000

      # --- Tool filter (optional, reduces LLM context bloat) ---
      # Default: all 18 tools enabled.
      # Common subset for "search places" use case:
      #   maps_search_places,maps_place_details,maps_geocode,maps_search_nearby
      - GOOGLE_MAPS_ENABLED_TOOLS=${GOOGLE_MAPS_ENABLED_TOOLS:-*}
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.3"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      # Internal MCP — no Traefik exposure. OpenWebUI reaches it via Docker DNS.
      - "traefik.enable=false"
    healthcheck:
      test: [
        "CMD",
        "node",
        "-e",
        "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
