networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  # ========================================================================
  # VictoriaMetrics Stack — comparison deployment alongside existing
  # Prometheus + Loki + Grafana (see stacks/monitoring + stacks/grafana).
  # Same scrape targets. Same dashboards (where possible). Side-by-side run.
  # ========================================================================

  # VictoriaMetrics — single-binary Prometheus-compatible TSDB.
  # Replaces Prometheus. Drop-in for PromQL queries.
  # Listens on 8428 (Prometheus remote write) and 8429 (Prometheus scrape).
  victoria-metrics:
    container_name: hl-victoria-metrics
    image: victoriametrics/victoria-metrics:v1.146.0
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=14"
      - "--httpListenAddr=:8428"
      - "--promscrape.config=/etc/vmagent/prometheus.yml"
      - "--graphiteListenAddr=:2003"
      - "--opentsdbListenAddr=:4242"
    volumes:
      - ${VOLUMES_PATH}/victoria-metrics/data:/storage:z
      - ${PATH_APPS}/configs/victoria-metrics/scrape.yml:/etc/vmagent/prometheus.yml:ro,z
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - proxy

  # VMAgent — Prometheus-compatible scraper.
  # Pushes scraped metrics to VictoriaMetrics via remote write.
  # Runs alongside VM rather than as the scraper inside VM.
  # (VictoriaMetrics can self-scrape, but vmagent is the canonical option.)
  vmagent:
    container_name: hl-vmagent
    image: victoriametrics/vmagent:v1.146.0
    command:
      - "-promscrape.config=/etc/vmagent/prometheus.yml"
      - "-remoteWrite.url=http://hl-victoria-metrics:8428/api/v1/write"
      - "-remoteWrite.maxDiskUsagePerURL=100MB"
    volumes:
      - ${PATH_APPS}/configs/victoria-metrics/scrape.yml:/etc/vmagent/prometheus.yml:ro,z
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
    security_opt:
      - no-new-privileges:true
    networks:
      - default

  # VictoriaLogs — single-binary log database.
  # Replaces Loki. Compatible with LogsQL (similar to LogQL).
  # Listens on 9428 for ingestion.
  victoria-logs:
    container_name: hl-victoria-logs
    image: victoriametrics/victoria-logs:v1.51.0
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=14"
      - "--httpListenAddr=:9428"
    volumes:
      - ${VOLUMES_PATH}/victoria-logs/data:/storage:z
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - proxy

  # Promtail (VictoriaLogs variant) — ships container logs to VictoriaLogs.
  # Same scrape config as the Loki-targeted promtail, different push target.
  # Runs as a separate instance so the existing Loki stack is unaffected.
  promtail-vm:
    container_name: hl-promtail-vm
    image: grafana/promtail:3.2.1
    volumes:
      - ${PATH_APPS}/configs/victoria-metrics/promtail-vm.yml:/etc/promtail/config.yml:ro,z
      - /var/log:/var/log:ro,z
      - /var/lib/docker/containers:/var/lib/docker/containers:ro,z
      - /var/run/docker.sock:/var/run/docker.sock:ro,z
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
    security_opt:
      - no-new-privileges:true
    networks:
      - default

  # Grafana (VictoriaMetrics variant) — separate instance for side-by-side
  # comparison with the existing metrics.${DOMAIN} (Loki + Prometheus).
  grafana-vm:
    container_name: hl-grafana-vm
    image: grafana/grafana:11.3.0
    user: "0:0"
    environment:
      - GF_SERVER_ROOT_URL=https://metrics-vm.${DOMAIN}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_VM_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ${VOLUMES_PATH}/victoria-metrics/grafana:/var/lib/grafana:z
      - ${PATH_APPS}/configs/victoria-metrics/datasources:/etc/grafana/provisioning/datasources:ro,z
      - ${PATH_APPS}/configs/victoria-metrics/dashboards:/etc/grafana/provisioning/dashboards:ro,z
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-grafana-vm.loadbalancer.server.port=3000"
      - "traefik.http.routers.hl-grafana-vm.rule=Host(`metrics-vm.${DOMAIN}`)"
      - "traefik.http.routers.hl-grafana-vm.entrypoints=websecure"
      - "traefik.http.routers.hl-grafana-vm.tls=true"
      - "traefik.http.routers.hl-grafana-vm.tls.certresolver=myresolver"
      - "traefik.http.routers.hl-grafana-vm.middlewares=auth,robots-deny@file"
