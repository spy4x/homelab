networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  # caldav-mcp — lightweight CalDAV MCP server
  # Native Deno, zero npm deps, direct CalDAV protocol, proper VTODO/VEVENT support.
  caldav-mcp:
    container_name: hl-caldav-mcp
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - CALDAV_URL=${CALDAV_SERVER_URL}
      - CALDAV_USERNAME=${CALDAV_USERNAME}
      - CALDAV_PASSWORD=${CALDAV_PASSWORD}
      - MCP_BEARER_TOKEN=mcpo-local
      - PORT=3000
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    networks:
      - proxy
