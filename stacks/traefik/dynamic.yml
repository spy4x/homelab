http:
  middlewares:
    # Authentik forward auth - SSO with 2FA
    # Configure provider in Authentik admin: https://auth.${DOMAIN}
    # After creating application, all auth is handled by Authentik
    authentik:
      forwardAuth:
        address: http://hl-authentik:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          X-authentik-username: X-authentik-username
          X-authentik-groups: X-authentik-groups
          X-authentik-email: X-authentik-email
          X-authentik-name: X-authentik-name
          X-authentik-uid: X-authentik-uid
    compression:
      compress:
        excludedContentTypes:
          - text/event-stream
    security-headers:
      headers:
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        stsSeconds: 15552000
        stsIncludeSubdomains: true
        stsPreload: true
        permissionsPolicy: >-
          camera=(self), microphone=(self), clipboard-read=(self), clipboard-write=(self),
          geolocation=(), payment=(), usb=(),
          interest-cohort=(), browsing-topics=(), accelerometer=(),
          gyroscope=(), magnetometer=()
        customResponseHeaders:
          Cross-Origin-Opener-Policy: same-origin
          Cross-Origin-Resource-Policy: same-site
          Cross-Origin-Embedder-Policy: require-corp
          # X-Robots-Tag is intentionally NOT in security-headers. It lives in
          # its own middleware (robots-deny) so public sites (antonshubin,
          # neatsoft) can opt out by not including it in their router labels.
          # All private self-hosted services SHOULD add robots-deny@file to
          # their Traefik router middlewares. See docs/blocking-crawlers.md.
    # robots-deny: opt-in X-Robots-Tag noindex/nofollow for self-hosted services.
    # Add to a router's middlewares chain to block indexing:
    #   traefik.http.routers.X.middlewares=...,robots-deny@file
    # Public sites (antonshubin.com, neatsoft.dev) should NOT add this.
    robots-deny:
      headers:
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow, noarchive, nosnippet"
    # Unused — kept for documentation. Do not apply.
    allow-index:
      headers:
        customResponseHeaders:
          X-Robots-Tag: "all"
