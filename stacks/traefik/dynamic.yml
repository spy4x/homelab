http:
  middlewares:
    # Authentik forward auth - SSO with 2FA
    # Configure provider in Authentik admin: https://auth.${DOMAIN}
    # After creating application, all auth is handled by Authentik
    authentik:
      forwardAuth:
        address: http://hl-authentik:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          X-authentik-username: X-authentik-username
          X-authentik-groups: X-authentik-groups
          X-authentik-email: X-authentik-email
          X-authentik-name: X-authentik-name
          X-authentik-uid: X-authentik-uid
    compression:
      compress:
        excludedContentTypes:
          - text/event-stream
    security-headers:
      headers:
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        stsSeconds: 15552000
        stsIncludeSubdomains: true
        stsPreload: true
        permissionsPolicy: >-
          camera=(self), microphone=(self), clipboard-read=(self), clipboard-write=(self),
          geolocation=(), payment=(), usb=(),
          interest-cohort=(), browsing-topics=(), accelerometer=(),
          gyroscope=(), magnetometer=()
        customResponseHeaders:
          Cross-Origin-Opener-Policy: same-origin
          Cross-Origin-Resource-Policy: same-site
          Cross-Origin-Embedder-Policy: require-corp
          # Block indexing of all self-hosted services by default.
          # X-Robots-Tag is honored by Google, Bing, DuckDuckGo, and most AI
          # crawlers (GPTBot, ClaudeBot, CCBot, anthropic-ai, perplexity, etc.).
          # It is more reliable than robots.txt because it travels with every
          # response and cannot be ignored by simply not fetching /robots.txt.
          # Public-facing sites (antonshubin.com) override this via a dedicated
          # middleware in their own compose.yml to stay indexable for SEO.
          X-Robots-Tag: "noindex, nofollow, noarchive, nosnippet"
    # Override middleware for public-facing sites. Adds an empty X-Robots-Tag
    # header to suppress the default deny from security-headers. Use this on
    # antonshubin.com (personal site, wants SEO) and similar public sites.
    allow-index:
      headers:
        customResponseHeaders:
          X-Robots-Tag: ""
