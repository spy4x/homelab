http:
  middlewares:
    # Authelia forward auth - SSO with 2FA
    # Uses new /api/authz/forward-auth endpoint (v4.39+)
    # Old /api/verify?auth=send is deprecated, returns 401 without redirect
    authelia:
      forwardAuth:
        address: http://hl-authelia:9091/api/authz/forward-auth
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Email
          - Remote-Name
    compression:
      compress:
        excludedContentTypes:
          - text/event-stream
    security-headers:
      headers:
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        stsSeconds: 15552000
        stsIncludeSubdomains: true
        stsPreload: true
        permissionsPolicy: >-
          camera=(self), microphone=(self), clipboard-read=(self), clipboard-write=(self),
          geolocation=(), payment=(), usb=(),
          interest-cohort=(), browsing-topics=(), accelerometer=(),
          gyroscope=(), magnetometer=()
        customResponseHeaders:
          Cross-Origin-Opener-Policy: same-origin
          Cross-Origin-Resource-Policy: same-site
          Cross-Origin-Embedder-Policy: require-corp
          # X-Robots-Tag is intentionally NOT in security-headers. It lives in
          # its own middleware (robots-deny) so public sites (antonshubin,
          # neatsoft) can opt out by not including it in their router labels.
          # All private self-hosted services SHOULD add robots-deny@file to
          # their Traefik router middlewares. See docs/blocking-crawlers.md.
    # robots-deny: opt-in X-Robots-Tag noindex/nofollow for self-hosted services.
    # Add to a router's middlewares chain to block indexing:
    #   traefik.http.routers.X.middlewares=...,robots-deny@file
    # Public sites (antonshubin.com, neatsoft.dev) should NOT add this.
    robots-deny:
      headers:
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow, noarchive, nosnippet"
    # Unused — kept for documentation. Do not apply.
    allow-index:
      headers:
        customResponseHeaders:
          X-Robots-Tag: "all"

  # Non-Docker services — file-based routes (no Docker labels)
  routers:
    # OpenHands — standalone systemd service on host, not a container
    hl-openhands:
      rule: "Host(`code.antonshubin.com`)"
      entrypoints: websecure
      middlewares:
        - authelia
        - robots-deny
      service: hl-openhands
      tls:
        certResolver: myresolver
  services:
    hl-openhands:
      loadBalancer:
        servers:
          - url: "http://172.23.0.1:8001"
