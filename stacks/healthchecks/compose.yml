networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  # Healthchecks - Cron job and scheduled task monitoring
  # Receives HTTP/email pings from scheduled tasks, alerts when they don't check in
  # https://github.com/healthchecks/healthchecks
  healthchecks:
    container_name: hl-healthchecks
    image: healthchecks/healthchecks:latest
    user: "999:999" # Run as hc user (UID/GID 999)
    environment:
      - TZ=${TIMEZONE}
      - SECRET_KEY=${HEALTHCHECKS_SECRET_KEY}
      - DEBUG=False
      - SITE_ROOT=https://healthchecks.${DOMAIN}
      - SITE_NAME=Healthchecks
      - DEFAULT_FROM_EMAIL=${SMTP_FROM}
      - EMAIL_HOST=${SMTP_HOST}
      - EMAIL_PORT=${SMTP_PORT}
      - EMAIL_USE_TLS=True
      - EMAIL_USE_VERIFICATION=True
      - EMAIL_HOST_USER=${SMTP_USERNAME}
      - EMAIL_HOST_PASSWORD=${SMTP_PASSWORD}
      - REGISTRATION_OPEN=False
      - DISCORD_CLIENT_ID=
      - DISCORD_CLIENT_SECRET=
      - DB_NAME=/data/hc.sqlite
    volumes:
      - ${VOLUMES_PATH}/healthchecks:/data:z
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.hl-healthchecks.loadbalancer.server.port=8000"
      - "traefik.http.routers.hl-healthchecks.rule=Host(`healthchecks.${DOMAIN}`)"
      - "traefik.http.routers.hl-healthchecks.middlewares=robots-deny@file"
      - "traefik.http.routers.hl-healthchecks.entrypoints=websecure"
      - "traefik.http.routers.hl-healthchecks.tls=true"
      - "traefik.http.routers.hl-healthchecks.tls.certresolver=myresolver"
