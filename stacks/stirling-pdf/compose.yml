name: ${PROJECT}

networks:
  proxy:
    external: true
  default:
    external: true
    name: proxy

services:
  stirling-pdf:
    container_name: stirling-pdf
    image: frooodle/s-pdf:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    volumes:
      - ${VOLUMES_PATH}/stirling-pdf/data:/usr/share/tesseract-ocr/4.00/tessdata:z
      - ${VOLUMES_PATH}/stirling-pdf/config:/configs:z
    environment:
      - DOCKER_ENABLE_SECURITY=false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.stirling-pdf.loadbalancer.server.port=8080"
      - "traefik.http.routers.stirling-pdf.rule=Host(`tools.${DOMAIN}`)"
      - "traefik.http.routers.stirling-pdf.entrypoints=websecure"
      - "traefik.http.routers.stirling-pdf.tls=true"
      - "traefik.http.routers.stirling-pdf.middlewares=auth"
      - "traefik.http.routers.stirling-pdf.tls.certresolver=myresolver"
